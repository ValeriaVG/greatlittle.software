<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Previews</title>
</head>

<body class="preview-shell">
    <aside class="preview-sidebar">
        <h1>Previews</h1>
        <ul class="preview-list">
            <!--for p in previews-->
            <!--if p.group-->
            <li class="preview-group" style="--depth:{p.depth}" data-depth="{p.depth}">
                <button type="button" class="preview-group-toggle" aria-expanded="true">
                    <svg class="preview-chevron" viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M4 6l4 4 4-4" />
                    </svg>
                    <span>{p.group}</span>
                </button>
            </li>
            <!--/if-->
            <!--if p.href-->
            <li class="preview-item" style="--depth:{p.depth}" data-depth="{p.depth}"><a href="#{p.href}" data-path="{p.href}">{p.label}</a></li>
            <!--/if-->
            <!--/for-->
        </ul>
    </aside>
    <main class="preview-main">
        <div class="preview-toolbar" role="toolbar" aria-label="viewport">
            <button type="button" data-device="full" data-width="0" aria-pressed="true" aria-label="Full width" title="Full">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M6 2H2v4M10 2h4v4M6 14H2v-4M10 14h4v-4" />
                </svg>
            </button>
            <button type="button" data-device="desktop" data-width="1280" aria-pressed="false" aria-label="Desktop 1280" title="Desktop 1280">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="1.5" y="2.5" width="13" height="9" rx="1" />
                    <path d="M6 14h4M8 11.5V14" />
                </svg>
            </button>
            <button type="button" data-device="tablet" data-width="768" aria-pressed="false" aria-label="Tablet 768" title="Tablet 768">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="1.5" width="10" height="13" rx="1.5" />
                    <path d="M7 12.5h2" />
                </svg>
            </button>
            <button type="button" data-device="mobile" data-width="375" aria-pressed="false" aria-label="Mobile 375" title="Mobile 375">
                <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="4.5" y="1.5" width="7" height="13" rx="1.5" />
                    <path d="M7.5 12.5h1" />
                </svg>
            </button>
            <span class="preview-size" aria-live="polite"></span>
            <button type="button" class="preview-theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                <svg class="icon-moon" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M13.5 9.5A5.5 5.5 0 0 1 6.5 2.5a6 6 0 1 0 7 7z" />
                </svg>
                <svg class="icon-sun" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="8" cy="8" r="3" />
                    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.5 1.5M11.5 11.5L13 13M3 13l1.5-1.5M11.5 4.5L13 3" />
                </svg>
            </button>
        </div>
        <div class="preview-viewport">
            <iframe class="preview-frame" src="about:blank" title="preview"></iframe>
        </div>
    </main>
</body>

</html>
